version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: kasoku-postgres
    environment:
      POSTGRES_DB: kasoku
      POSTGRES_USER: kasoku
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kasoku-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasoku"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kasoku server
  kasoku-server:
    image: ghcr.io/thebushidocollective/kasoku-server:latest
    container_name: kasoku-server
    build:
      context: ../../server
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - DB_DRIVER=postgres
      - DB_DSN=host=postgres user=kasoku password=${DB_PASSWORD} dbname=kasoku port=5432 sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - STORAGE_PATH=/storage
      # Optional: S3 configuration
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      # Optional: Stripe billing (leave empty for self-hosted)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_INDIVIDUAL_PRICE_ID=${STRIPE_INDIVIDUAL_PRICE_ID:-}
      - STRIPE_TEAM_PRICE_ID=${STRIPE_TEAM_PRICE_ID:-}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL:-}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL:-}
      - STRIPE_RETURN_URL=${STRIPE_RETURN_URL:-}
    volumes:
      - storage_data:/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kasoku-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web dashboard
  kasoku-web:
    image: ghcr.io/thebushidocollective/kasoku-web:latest
    container_name: kasoku-web
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN}
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}
    depends_on:
      - kasoku-server
    networks:
      - kasoku-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Caddy - Reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: kasoku-caddy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - kasoku-server
      - kasoku-web
    networks:
      - kasoku-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  kasoku-net:
    driver: bridge
