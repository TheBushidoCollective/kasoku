syntax = "proto3";

package brisk.cache.v1;

option go_package = "github.com/thebushidocollective/brisk/pkg/api";

service CacheService {
  rpc CheckCache(CheckCacheRequest) returns (CheckCacheResponse);
  rpc GetCache(GetCacheRequest) returns (stream CacheChunk);
  rpc PutCache(stream CacheChunk) returns (PutCacheResponse);
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);
  rpc ListCaches(ListCachesRequest) returns (ListCachesResponse);
  rpc GetAnalytics(GetAnalyticsRequest) returns (GetAnalyticsResponse);
}

message CheckCacheRequest {
  string hash = 1;
  string token = 2;
}

message CheckCacheResponse {
  bool exists = 1;
  int64 size = 2;
  int64 timestamp = 3;
}

message GetCacheRequest {
  string hash = 1;
  string token = 2;
}

message CacheChunk {
  string hash = 1;
  bytes data = 2;
  CacheMetadata metadata = 3;
  bool is_last = 4;
}

message CacheMetadata {
  string hash = 1;
  int64 timestamp = 2;
  string command = 3;
  repeated string outputs = 4;
  string stdout = 5;
  string stderr = 6;
  int32 exit_code = 7;
  int64 duration_ms = 8;
  HashDetails details = 9;
}

message HashDetails {
  map<string, string> files = 1;
  map<string, string> environment = 2;
  map<string, string> commands = 3;
  string command = 4;
}

message PutCacheResponse {
  bool success = 1;
  string message = 2;
  int64 size = 3;
}

message GetMetadataRequest {
  string hash = 1;
  string token = 2;
}

message GetMetadataResponse {
  CacheMetadata metadata = 1;
  repeated HashChange changes = 2;
}

message HashChange {
  string type = 1;
  string path = 2;
  string old_value = 3;
  string new_value = 4;
  string description = 5;
}

message ListCachesRequest {
  string token = 1;
  int32 limit = 2;
  int32 offset = 3;
  string filter = 4;
}

message ListCachesResponse {
  repeated CacheMetadata caches = 1;
  int32 total = 2;
}

message GetAnalyticsRequest {
  string token = 1;
  int64 start_time = 2;
  int64 end_time = 3;
}

message GetAnalyticsResponse {
  int64 total_cache_hits = 1;
  int64 total_cache_misses = 2;
  int64 total_time_saved_ms = 3;
  int64 total_commands_run = 4;
  repeated CommandStats command_stats = 5;
  repeated DailyStats daily_stats = 6;
}

message CommandStats {
  string command = 1;
  int64 cache_hits = 2;
  int64 cache_misses = 3;
  int64 time_saved_ms = 4;
  int64 avg_duration_ms = 5;
}

message DailyStats {
  string date = 1;
  int64 cache_hits = 2;
  int64 cache_misses = 3;
  int64 time_saved_ms = 4;
}
