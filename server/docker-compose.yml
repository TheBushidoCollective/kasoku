  #     - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
  #     - STORAGE_TYPE=local
  #     - STORAGE_PATH=/storage
  #   volumes:
  #     - ./storage:/storage
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped

