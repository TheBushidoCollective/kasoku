version: '3.8'

services:
  # Kasoku Server (SQLite - simplest setup)
  kasoku-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_DRIVER=sqlite
      - DB_DSN=/data/kasoku.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - STORAGE_TYPE=local
      - STORAGE_PATH=/storage
    volumes:
      - ./data:/data
      - ./storage:/storage
    restart: unless-stopped

  # Optional: Kasoku Server with PostgreSQL
  # Uncomment the sections below to use PostgreSQL instead of SQLite

  # postgres:
