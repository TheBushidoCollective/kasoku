  #     - POSTGRES_PASSWORD=kasoku_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

  # kasoku-server-postgres:
  #   build: .
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - PORT=8080
  #     - DB_DRIVER=postgres
